<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RMS XWEB+ Console</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <style>
    :root{--bg:#060b16;--panel:#0d162a;--panel2:#111d35;--line:#2a3a5a;--text:#dbe7ff;--muted:#8fa3c8;--ok:#22c55e;--warn:#f59e0b;--err:#ef4444;--pri:#3b82f6}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 20% 20%, #17294f 0, var(--bg) 45%);color:var(--text);font-family:Inter,system-ui,Arial,sans-serif}
    header{display:flex;gap:8px;align-items:center;padding:12px 16px;background:rgba(5,10,20,.9);border-bottom:1px solid var(--line);position:sticky;top:0;backdrop-filter: blur(8px);z-index:3}
    .brand{font-weight:700;margin-right:12px;color:#8dc5ff}
    button,.btn{background:linear-gradient(180deg,#1b2c4e,#12213f);color:var(--text);border:1px solid #355084;border-radius:10px;padding:8px 12px;cursor:pointer}
    button.active{outline:2px solid #4d90ff}
    .container{padding:16px;display:grid;gap:14px}
    .grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:12px;padding:12px;box-shadow:0 8px 20px rgba(0,0,0,.25)}
    .big{font-size:28px;font-weight:700} .muted{color:var(--muted);font-size:12px}
    .page{display:none}.page.active{display:block}
    table{width:100%;border-collapse:collapse} th,td{padding:8px;border-bottom:1px solid var(--line);font-size:12px;text-align:left}
    select,input{background:#091225;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px}
    .chip{padding:2px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px}
    .ok{color:var(--ok)}.warn{color:var(--warn)}.err{color:var(--err)}
    #latestFeed{max-height:260px;overflow:auto}
  </style>
</head>
<body>
  <header>
    <div class="brand">RMS XWEB+ Console</div>
    <button data-page="dashboard" class="active">Dashboard</button>
    <button data-page="devices">Devices</button>
    <button data-page="alarms">Alarms</button>
    <button data-page="reports">Reports</button>
    <button data-page="map">Map</button>
    <span style="margin-left:auto" class="chip">WS <b id="wsState">connecting</b></span>
  </header>

  <div class="container">
    <section id="dashboard" class="page active">
      <div class="grid" id="summaryCards"></div>
      <div class="card">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
          <select id="sensorSelect" multiple size="4" style="min-width:320px"></select>
          <select id="rangeSelect"><option value="10m">10 min</option><option value="1h">1 hour</option><option value="24h">24 hours</option></select>
          <button id="reloadBtn">Reload data</button>
          <button id="resetZoom">Reset zoom</button>
        </div>
        <canvas id="chart" height="100"></canvas>
      </div>
      <div class="grid">
        <div class="card"><h3 style="margin-top:0">Live telemetry</h3><div id="latestFeed"></div></div>
        <div class="card"><h3 style="margin-top:0">Quality status</h3><div id="qualityBoard"></div></div>
      </div>
    </section>

    <section id="devices" class="page">
      <div class="card">
        <h3 style="margin-top:0">Create device</h3>
        <div class="grid">
          <input id="dName" placeholder="name"/><input id="dProtocol" value="modbus_rtu"/><input id="dPort" value="RS485_1"/>
          <input id="dSlave" type="number" value="1"/><input id="dPoll" type="number" value="5"/><button id="createDevice">Create</button>
        </div>
      </div>
      <div class="card"><table id="devicesTable"></table></div>
      <div class="card"><h3 style="margin-top:0">Sensors of selected device</h3><select id="devicePicker"></select><table id="deviceSensors"></table></div>
    </section>

    <section id="alarms" class="page">
      <div class="grid">
        <div class="card"><h3 style="margin-top:0">Active alarms</h3><table id="activeTable"></table></div>
        <div class="card"><h3 style="margin-top:0">Alarm history</h3><table id="historyTable"></table></div>
      </div>
    </section>

    <section id="reports" class="page">
      <div class="card" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button id="csvBtn">Export CSV</button><button id="pdfBtn">Export PDF</button>
      </div>
      <div class="card"><h3 style="margin-top:0">Audit log</h3><table id="eventsTable"></table></div>
    </section>


    <section id="map" class="page">
      <div class="card">
        <h3 style="margin-top:0">Floor plan visualization</h3>
        <input id="mapUpload" type="file" accept="image/*" />
        <div id="mapCanvas" style="position:relative;margin-top:10px;min-height:420px;border:1px dashed var(--line);border-radius:12px;overflow:hidden"></div>
      </div>
    </section>

  </div>

<script>
const API='http://localhost:8000', WS='ws://localhost:8000/ws';
const colors=['#38bdf8','#f97316','#22c55e','#a855f7','#eab308','#ef4444','#10b981','#6366f1'];
const selected=new Set(), dsMap=new Map(), latest=[];
const chart=new Chart(document.getElementById('chart'),{type:'line',data:{labels:[],datasets:[]},options:{animation:false,interaction:{mode:'nearest'},plugins:{legend:{labels:{color:'#dbe7ff'}},zoom:{pan:{enabled:true,mode:'x'},zoom:{wheel:{enabled:true},pinch:{enabled:true},mode:'x'}}},scales:{x:{ticks:{color:'#8fa3c8'}},y:{ticks:{color:'#8fa3c8'}}}}});

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id===id));document.querySelectorAll('button[data-page]').forEach(x=>x.classList.toggle('active',x.dataset.page===id));}
document.querySelectorAll('button[data-page]').forEach(b=>b.onclick=()=>showPage(b.dataset.page));

function addTelemetry(row){
  const key=String(row.sensor_id); if(selected.size && !selected.has(key)) return;
  if(!dsMap.has(key)){const ds={label:`S${key}`,data:[],borderColor:colors[dsMap.size%colors.length],tension:.2}; dsMap.set(key,ds); chart.data.datasets.push(ds)}
  chart.data.labels.push(new Date(row.timestamp).toLocaleTimeString());
  chart.data.datasets.forEach(ds=>{ ds.data.push(ds.label===`S${key}`?row.value:null); if(ds.data.length>240) ds.data.shift();});
  if(chart.data.labels.length>240) chart.data.labels.shift();
  chart.update();
  latest.unshift(row); if(latest.length>60) latest.pop();
  drawLive();
}
function drawLive(){
  latestFeed.innerHTML=latest.slice(0,14).map(r=>`<div class='muted'>${new Date(r.timestamp).toLocaleTimeString()} • S${r.sensor_id} = <b>${r.value}</b> <span class='${r.quality==='OK'?'ok':r.quality==='OFFLINE'?'err':'warn'}'>${r.quality}</span></div>`).join('');
  const q={OK:0,ERROR:0,OFFLINE:0}; latest.forEach(r=>q[r.quality]=(q[r.quality]||0)+1);
  qualityBoard.innerHTML=`<div class='big ok'>${q.OK||0}</div><div class='muted'>OK samples</div><div class='big warn'>${q.ERROR||0}</div><div class='muted'>ERROR samples</div><div class='big err'>${q.OFFLINE||0}</div><div class='muted'>OFFLINE samples</div>`;
}

async function loadSummary(){
  const s=await fetch(`${API}/dashboard/summary`).then(r=>r.json());
  summaryCards.innerHTML=`
  <div class='card'><div class='big'>${s.devices_total}</div><div class='muted'>Devices</div></div>
  <div class='card'><div class='big'>${s.online_devices}</div><div class='muted'>Online devices</div></div>
  <div class='card'><div class='big'>${s.sensors_total}</div><div class='muted'>Sensors</div></div>
  <div class='card'><div class='big err'>${s.active_alarms}</div><div class='muted'>Active alarms</div></div>`;
}
async function loadSensors(){
  const sensors=await fetch(`${API}/sensors`).then(r=>r.json()); sensorSelect.innerHTML='';
  sensors.forEach((s,i)=>{const o=document.createElement('option');o.value=String(s.id);o.textContent=`${s.id}: ${s.name} (D${s.device_id})`;sensorSelect.appendChild(o);if(selected.size===0&&i<8)selected.add(String(s.id));});
  [...sensorSelect.options].forEach(o=>o.selected=selected.has(o.value));
}
async function reloadData(){
  chart.data.labels=[];chart.data.datasets=[];dsMap.clear();
  const ids=[...selected].join(',');
  const rows=await fetch(`${API}/data?limit=2400&sensor_ids=${ids}&range=${rangeSelect.value}`).then(r=>r.json());
  rows.forEach(addTelemetry);
}
sensorSelect.onchange=()=>{selected.clear();[...sensorSelect.selectedOptions].forEach(o=>selected.add(o.value));reloadData();}
reloadBtn.onclick=reloadData; resetZoom.onclick=()=>chart.resetZoom(); rangeSelect.onchange=reloadData;

async function loadDevices(){
  const devs=await fetch(`${API}/devices`).then(r=>r.json());
  devicesTable.innerHTML='<tr><th>ID</th><th>Name</th><th>Protocol</th><th>Port</th><th>Status</th><th>Last seen</th></tr>'+devs.map(d=>`<tr><td>${d.id}</td><td>${d.name}</td><td>${d.protocol}</td><td>${d.port}</td><td>${d.status}</td><td>${d.last_seen||''}</td></tr>`).join('');
  devicePicker.innerHTML=devs.map(d=>`<option value='${d.id}'>${d.id} - ${d.name}</option>`).join('');
  if(devs[0]) loadDeviceSensors(devs[0].id);
  buildMap(devs);
}
async function loadDeviceSensors(id){
  const rows=await fetch(`${API}/devices/${id}/sensors`).then(r=>r.json());
  deviceSensors.innerHTML='<tr><th>ID</th><th>Name</th><th>Type</th><th>Unit</th><th>Active</th></tr>'+rows.map(r=>`<tr><td>${r.id}</td><td>${r.name}</td><td>${r.data_type}</td><td>${r.unit}</td><td>${r.is_active}</td></tr>`).join('');
}
devicePicker.onchange=()=>loadDeviceSensors(devicePicker.value);
createDevice.onclick=async()=>{await fetch(`${API}/devices`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({name:dName.value,protocol:dProtocol.value,port:dPort.value,slave_id:+dSlave.value,poll_interval:+dPoll.value})});dName.value='';loadDevices();loadSummary();};

async function loadAlarms(){
  const [active,hist]=await Promise.all([fetch(`${API}/alarms/events?active_only=true`).then(r=>r.json()),fetch(`${API}/alarms/events`).then(r=>r.json())]);
  activeTable.innerHTML='<tr><th>ID</th><th>Sensor</th><th>Message</th><th>Status</th><th>Action</th></tr>'+active.map(a=>`<tr><td>${a.id}</td><td>${a.sensor_id}</td><td>${a.message}</td><td class='err'>${a.status}</td><td><button onclick='ack(${a.id})'>ACK</button></td></tr>`).join('');
  historyTable.innerHTML='<tr><th>ID</th><th>Sensor</th><th>Status</th><th>Start</th><th>End</th></tr>'+hist.map(a=>`<tr><td>${a.id}</td><td>${a.sensor_id}</td><td>${a.status}</td><td>${a.start_time}</td><td>${a.end_time||''}</td></tr>`).join('');
}
window.ack=async(id)=>{await fetch(`${API}/alarms/events/${id}/ack`,{method:'POST'});loadAlarms();loadSummary();}

async function loadEvents(){
  const rows=await fetch(`${API}/events?limit=300`).then(r=>r.json());
  eventsTable.innerHTML='<tr><th>Time</th><th>Type</th><th>Description</th></tr>'+rows.map(e=>`<tr><td>${e.timestamp}</td><td>${e.type}</td><td>${e.description}</td></tr>`).join('');
}

csvBtn.onclick=()=>window.open(`${API}/reports/csv?hours=24`,'_blank');
pdfBtn.onclick=()=>window.open(`${API}/reports/pdf?hours=24`,'_blank');

function connectWS(){
  const ws=new WebSocket(WS);
  ws.onopen=()=>wsState.textContent='connected';
  ws.onclose=()=>{wsState.textContent='reconnecting';setTimeout(connectWS,1200)};
  ws.onmessage=ev=>{const msg=JSON.parse(ev.data); if(msg.type==='measurement') addTelemetry(msg); if(msg.type==='alarm'){loadAlarms();loadSummary();} };
  setInterval(()=>ws.readyState===1&&ws.send('ping'),10000);
}


const markerPos = JSON.parse(localStorage.getItem('rms_marker_pos') || '{}');
function buildMap(devices){
  mapCanvas.innerHTML = mapCanvas.querySelector('img') ? mapCanvas.innerHTML : '<div class="muted" style="padding:10px">Upload floor plan image and drag markers</div>';
  devices.forEach((d,i)=>{
    let m=document.getElementById('mk-'+d.id);
    if(!m){
      m=document.createElement('div');m.id='mk-'+d.id;m.textContent='📍';m.title=d.name;m.style.cssText='position:absolute;left:20px;top:'+((i*24)+20)+'px;cursor:move;font-size:20px;';
      const lbl=document.createElement('span'); lbl.textContent=' '+d.name; lbl.style.fontSize='11px'; lbl.style.color='#fff'; m.appendChild(lbl);
      mapCanvas.appendChild(m);
      let drag=false,ox=0,oy=0;
      m.onmousedown=(e)=>{drag=true;ox=e.offsetX;oy=e.offsetY;};
      window.addEventListener('mousemove',(e)=>{if(!drag)return; const r=mapCanvas.getBoundingClientRect(); m.style.left=(e.clientX-r.left-ox)+'px'; m.style.top=(e.clientY-r.top-oy)+'px';});
      window.addEventListener('mouseup',()=>{if(!drag)return; drag=false; markerPos[d.id]={left:m.style.left,top:m.style.top}; localStorage.setItem('rms_marker_pos', JSON.stringify(markerPos));});
      m.onclick=()=>showPage('devices');
    }
    if(markerPos[d.id]){m.style.left=markerPos[d.id].left;m.style.top=markerPos[d.id].top;}
  });
}
mapUpload.onchange=(e)=>{const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=()=>{mapCanvas.innerHTML='';const img=document.createElement('img');img.src=reader.result;img.style.cssText='width:100%;height:100%;object-fit:contain;';mapCanvas.appendChild(img);loadDevices();}; reader.readAsDataURL(file);};

(async function boot(){ await loadSummary(); await loadSensors(); await reloadData(); await loadDevices(); await loadAlarms(); await loadEvents(); connectWS(); setInterval(()=>{loadSummary();loadDevices();loadEvents();},20000); })();
</script>
</body>
</html>
