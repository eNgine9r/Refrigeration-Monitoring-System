services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rms
      POSTGRES_USER: rms
      POSTGRES_PASSWORD: rms
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rms -d rms"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://rms:rms@db:5432/rms
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  collector:
    build: ./collector
    environment:
      BACKEND_URL: http://backend:8000
      DEVICES_CONFIG: /app/config/devices.json
    depends_on:
      - backend

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db_data:
